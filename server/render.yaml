# Render blueprint — paste into Render dashboard or `render.yaml` at repo root.
services:
  - type: web
    name: hope-pdf-server
    env: node
    rootDir: server
    # All system + Python deps live in install.sh (set -e + verification).
    # If pdf2docx fails to install, the build fails fast — never silently.
    # If your Render plan blocks apt-get at build time, switch to a
    # Dockerfile-based service and copy install.sh into the image.
    buildCommand: bash ./install.sh && npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FREE_MAX_FILE_MB
        value: "20"
      - key: PREMIUM_MAX_FILE_MB
        value: "100"
      - key: FREE_HOURLY_QUOTA
        value: "5"
      - key: PREMIUM_HOURLY_QUOTA
        value: "200"
