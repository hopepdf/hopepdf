# Render blueprint — Docker-based service.
#
# We deliberately use Docker (not the native Node env) because pdf2docx
# requires guaranteed python3 + pip3 + apt access at build time. The
# Dockerfile bakes everything in a verified image; render.yaml only
# tells Render where the Dockerfile lives.

services:
  - type: web
    name: hope-pdf-server
    env: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FREE_HOURLY_QUOTA
        value: "5"
      - key: PREMIUM_HOURLY_QUOTA
        value: "200"
