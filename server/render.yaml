# Render blueprint — paste into Render dashboard or `render.yaml` at repo root.
services:
  - type: web
    name: hope-pdf-server
    env: node
    rootDir: server
    # PDF → DOCX uses pdf2docx as the PRIMARY engine (preserves real text +
    # tables). LibreOffice is the fallback for files pdf2docx can't parse.
    # Render base images are Debian — apt-get + pip3 are available at build.
    buildCommand: |
      apt-get update && \
      apt-get install -y --no-install-recommends \
        python3 python3-pip \
        libreoffice-core libreoffice-writer && \
      pip3 install --break-system-packages pdf2docx && \
      npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FREE_MAX_FILE_MB
        value: "20"
      - key: PREMIUM_MAX_FILE_MB
        value: "100"
      - key: FREE_HOURLY_QUOTA
        value: "5"
      - key: PREMIUM_HOURLY_QUOTA
        value: "200"
